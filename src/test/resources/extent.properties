basefolder.name=Reports/
basefolder.datetimepattern=dd-MMM-yyyy_HH-mm-ss

# Enable Spark (HTML) Report
extent.reporter.spark.start=true
extent.reporter.spark.out=ExtentReports/SparkReport.html
extent.reporter.spark.base64_source=false

# Enable PDF Report (Powered by grasshopper adapter)
extent.reporter.pdf.start=true
extent.reporter.pdf.out=PDFReports/ExecutionReport.pdf
extent.reporter.pdf.base64_source=false

screenshot.dir=Reports/ScreenShots/
screenshot.rel.path=../ScreenShots/

# Spark Report UI Configurations
extent.reporter.spark.config.theme=dark
extent.reporter.spark.config.documentTitle=Hybrid Automation Framework
extent.reporter.spark.config.reportName=Automated Test Execution Results
extent.reporter.spark.config.encoding=UTF-8
extent.reporter.spark.config.protocol=https
extent.reporter.spark.config.timelineEnabled=true

# System Information to display on the report dashboard
systeminfo.Framework=Cucumber TestNG Hybrid
systeminfo.Author=Automation Team
systeminfo.Environment=QA

# Hide the method names like "com.framework.Hooks.addScreenshotAfterStep"
cucumber.adapter.reporting_hooks=false