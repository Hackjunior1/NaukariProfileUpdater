name: Mirror to GitLab
on: [push, delete]
jobs:
  gitlab-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@gitlab.com:Hackjunior1/NaukariProfileUpdater.git
          ssh_private_key: ${{ secrets.GITLAB_TOKEN }}
